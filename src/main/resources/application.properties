# ?? Server ????????????????????????????????????????????????????????????????????
server.port=${PORT:8080}
server.address=0.0.0.0

# ?? Timezone (IST) ????????????????????????????????????????????????????????????
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata

# ?? Database (PostgreSQL on Render, H2 locally) ???????????????????????????????
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./ttplatform-db}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# ?? JPA ???????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# ?? CRITICAL: Prevent connection drops on idle (Render free tier) ?????????????
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000
spring.jpa.open-in-view=false

# ?? H2 Console (disabled in production) ??????????????????????????????????????
spring.h2.console.enabled=${H2_CONSOLE:false}
spring.h2.console.path=/h2-console

# ?? JWT (7 days expiry instead of 1 day) ?????????????????????????????????????
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGeneration12345678901234567890}
jwt.expiration=604800000

# ?? AI: Groq ??????????????????????????????????????????????????????????????????
ai.provider=groq
ai.api.key=${GROQ_API_KEY:YOUR_GROQ_KEY_HERE}
ai.ollama.url=http://localhost:11434

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.tt=INFO
logging.level.org.springframework.security=WARN
