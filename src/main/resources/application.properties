# ?? Server ????????????????????????????????????????????????????????????????????
server.port=${PORT:8080}
server.address=0.0.0.0

# ?? Timezone (IST) ????????????????????????????????????????????????????????????
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata

# ?? Database (PostgreSQL on Render, H2 locally) ???????????????????????????????
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./ttplatform-db}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# ?? JPA ???????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# ?? CRITICAL: Prevent connection drops on idle (Render free tier) ?????????????
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000
spring.jpa.open-in-view=false

# ?? H2 Console (disabled in production) ??????????????????????????????????????
spring.h2.console.enabled=${H2_CONSOLE:false}
spring.h2.console.path=/h2-console

# ?? JWT (7 days expiry instead of 1 day) ?????????????????????????????????????
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGeneration12345678901234567890}
jwt.expiration=604800000

# ?? AI: Groq ??????????????????????????????????????????????????????????????????
ai.provider=groq
ai.api.key=${GROQ_API_KEY:YOUR_GROQ_KEY_HERE}
ai.ollama.url=http://localhost:11434

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.tt=INFO
logging.level.org.springframework.security=WARN

# ?? Email (Gmail App Password for OTP) ???????????????????????????????????????
# 1. Go to myaccount.google.com ? Security ? 2-Step Verification ? App Passwords
# 2. Create an app password, paste it below (or set MAIL_PASSWORD env var on Render)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-gmail@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ?? OAuth2 Social Login ???????????????????????????????????????????????????????
# Google: console.cloud.google.com ? APIs & Services ? Credentials ? OAuth 2.0
# Redirect URI to register: https://tt-bakend.onrender.com/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# GitHub: github.com/settings/developers ? New OAuth App
# Redirect URI: https://tt-bakend.onrender.com/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=user:email

# LinkedIn: developer.linkedin.com ? Create App ? Auth tab
# Redirect URI: https://tt-bakend.onrender.com/login/oauth2/code/linkedin
spring.security.oauth2.client.registration.linkedin.client-id=${LINKEDIN_CLIENT_ID:your-linkedin-client-id}
spring.security.oauth2.client.registration.linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:your-linkedin-client-secret}
spring.security.oauth2.client.registration.linkedin.scope=openid,profile,email
spring.security.oauth2.client.registration.linkedin.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.linkedin.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.linkedin.authorization-uri=https://www.linkedin.com/oauth/v2/authorization
spring.security.oauth2.client.provider.linkedin.token-uri=https://www.linkedin.com/oauth/v2/accessToken
spring.security.oauth2.client.provider.linkedin.user-info-uri=https://api.linkedin.com/v2/userinfo
spring.security.oauth2.client.provider.linkedin.user-name-attribute=sub
